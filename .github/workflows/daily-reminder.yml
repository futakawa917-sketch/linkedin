name: Daily LinkedIn Action Reminder

on:
  schedule:
    - cron: '0 0 * * *'  # 9:00 AM JST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily actions
        run: python scripts/daily_reminder.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ data/
          git diff --staged --quiet || git commit -m "Daily reminder for $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push
